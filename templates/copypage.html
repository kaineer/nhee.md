<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nord Text</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #2e3440;
      font-family: system-ui, 'Segoe UI', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .card {
      background-color: #3b4252;
      max-width: 800px;
      width: 100%;
      border-radius: 1.5rem;
      padding: 2rem;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.4);
      border: 1px solid #434c5e;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 600;
      color: #eceff4;
      border-left: 5px solid #88c0d0;
      padding-left: 1rem;
      margin-bottom: 1.75rem;
      word-break: break-word;
    }

    .text-container {
      background-color: #2e3440;
      border-radius: 1rem;
      padding: 1.5rem;
      border: 1px solid #4c566a;
      transition: all 0.1s ease;
    }

    .copyable-text {
      color: #d8dee9;
      font-size: 1.1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: pointer;
      user-select: none;
    }

    .copyable-text:hover {
      color: #81a1c1;
    }

    .copy-feedback {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: #a3be8c;
      text-align: right;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s;
      letter-spacing: 0.3px;
    }

    .copy-feedback.show {
      opacity: 1;
    }

    hr {
      border: none;
      height: 1px;
      background: #4c566a;
      margin: 1.2rem 0 0.5rem 0;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="title" id="titlePlaceholder">Your title here</div>
  <div class="text-container">
    <div class="copyable-text" id="textPlaceholder">
      Click this text to copy it to clipboard.
    </div>
    <div class="copy-feedback" id="copyFeedback">✓ Copied to clipboard</div>
  </div>
  <hr />
</div>

<script>
  (function() {
    const titleEl = document.getElementById('titlePlaceholder');
    const textEl = document.getElementById('textPlaceholder');
    const feedbackEl = document.getElementById('copyFeedback');

    // Example: you can replace these with any title/text you want
    titleEl.innerText = 'Nordic design — click to copy';
    textEl.innerText = 'The night is dark and full of terrors, but the code is clean. — Nord theme';

    async function copyToClipboard() {
      const textToCopy = textEl.innerText;
      try {
        await navigator.clipboard.writeText(textToCopy);
        feedbackEl.classList.add('show');
        setTimeout(() => {
          feedbackEl.classList.remove('show');
        }, 1800);
      } catch (err) {
        feedbackEl.style.color = '#bf616a';
        feedbackEl.innerText = '⚠️ Failed to copy';
        feedbackEl.classList.add('show');
        setTimeout(() => {
          feedbackEl.classList.remove('show');
          feedbackEl.innerText = '✓ Copied to clipboard';
          feedbackEl.style.color = '#a3be8c';
        }, 2000);
      }
    }

    textEl.addEventListener('click', copyToClipboard);
  })();
</script>
</body>
</html>
