page:
  title: "Прилагательные, 2"
  type: "kanji"

kanji:
  - char: "特"
    readings: "とく, とっ"
    meaning: "Особенный, специальный"
    examples:
      - kanji: "特に"
        reading: "とくに"
        meaning: "Особенно"
      - kanji: "特別"
        reading: "とくべつ"
        meaning: "Особенный, специальный"
      - kanji: "特急"
        reading: "とっきゅう"
        meaning: "Экспресс (скорый поезд)"

  - char: "別"
    readings: "べつ, わか"
    meaning: "Отдельный, раздельный"
    examples:
      - kanji: "別れます"
        reading: "わかれます"
        meaning: "Расставаться, отделяться"
      - kanji: "別々に"
        reading: "べつべつに"
        meaning: "Отдельно, порознь"
      - kanji: "区別します"
        reading: "くべつします"
        meaning: "Различать, отличать"
      - kanji: "分別します"
        reading: "ぶんべつします"
        meaning: "Классифицировать, разделять"
      - kanji: "送別"
        reading: "そうべつ"
        meaning: "Прощание, проводы"

  - char: "有"
    readings: "あ, ゆう"
    meaning: "Наличие, существование"
    examples:
      - kanji: "有ります"
        reading: "あります"
        meaning: "Иметь, быть, находиться"
      - kanji: "有名"
        reading: "ゆうめい"
        meaning: "Известный, знаменитый"
      - kanji: "有料"
        reading: "ゆうりょう"
        meaning: "Платный"

  - char: "便"
    readings: "べん, びん"
    meaning: "Удобство, почта"
    examples:
      - kanji: "便り"
        reading: "たより"
        meaning: "Письмо, весточка"
      - kanji: "便利"
        reading: "べんり"
        meaning: "Удобный"
      - kanji: "郵便局"
        reading: "ゆうびんきょく"
        meaning: "Почтовое отделение"
      - kanji: "船便"
        reading: "ふなびん"
        meaning: "Морская почта"

  - char: "利"
    readings: "り"
    meaning: "Прибыль, выгода"
    examples:
      - kanji: "便利"
        reading: "べんり"
        meaning: "Удобный"
      - kanji: "利用します"
        reading: "りようします"
        meaning: "Использовать, пользоваться"
      - kanji: "利し"
        reading: "りし"
        meaning: "Процент, прибыль"
      - kanji: "有利"
        reading: "ゆうり"
        meaning: "Выгодный, преимущественный"

  - char: "不"
    readings: "ふ, ぶ"
    meaning: "Не, отрицание (префикс)"
    examples:
      - kanji: "不便"
        reading: "ふべん"
        meaning: "Неудобный"
      - kanji: "不足します"
        reading: "ふそくします"
        meaning: "Не хватать, быть недостаточным"
      - kanji: "不安"
        reading: "ふあん"
        meaning: "Беспокойство, тревога"
      - kanji: "不運"
        reading: "ふうん"
        meaning: "Неудача, несчастье"

  - char: "切"
    readings: "き, せつ"
    meaning: "Резать, отрезать"
    examples:
      - kanji: "切ります"
        reading: "きります"
        meaning: "Резать, отрезать"
      - kanji: "切手"
        reading: "きって"
        meaning: "Почтовая марка"
      - kanji: "大切"
        reading: "たいせつ"
        meaning: "Важный, ценный"
      - kanji: "親切"
        reading: "しんせつ"
        meaning: "Добрый, любезный"

  - char: "元"
    readings: "げん, がん, もと"
    meaning: "Происхождение, источник, начало"
    examples:
      - kanji: "元気"
        reading: "げんき"
        meaning: "Здоровый, бодрый"
      - kanji: "元日"
        reading: "がんじつ"
        meaning: "Новый год (первый день года)"
      - kanji: "地元"
        reading: "じもと"
        meaning: "Местный, родной город"

  - char: "好"
    readings: "す, こう"
    meaning: "Любить, нравиться"
    examples:
      - kanji: "好き"
        reading: "すき"
        meaning: "Нравиться, любить"
      - kanji: "大好き"
        reading: "だいすき"
        meaning: "Очень нравится, обожать"
      - kanji: "好意"
        reading: "こうい"
        meaning: "Расположение, симпатия"
      - kanji: "好物"
        reading: "こうぶつ"
        meaning: "Любимое блюдо"

  - char: "急"
    readings: "いそ, きゅう"
    meaning: "Спешить, срочный"
    examples:
      - kanji: "急ぎます"
        reading: "いそぎます"
        meaning: "Спешить, торопиться"
      - kanji: "急に"
        reading: "きゅうに"
        meaning: "Внезапно, неожиданно"
      - kanji: "特急"
        reading: "とっきゅう"
        meaning: "Экспресс (скоростной поезд)"
      - kanji: "急用"
        reading: "きゅうよう"
        meaning: "Срочное дело"
