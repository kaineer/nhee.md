page:
  title: "Прилагательные, 1"
  type: "kanji"

kanji:
  - char: "明"
    readings: "あか, めい"
    meaning: "Яркость, свет"
    examples:
      - kanji: "明るい"
        reading: "あかるい"
        meaning: "Яркий, светлый"
      - kanji: "明日"
        reading: "あした"
        meaning: "Завтра"
      - kanji: "説明"
        reading: "せつめい"
        meaning: "Объяснение"
      - kanji: "発明"
        reading: "はつめい"
        meaning: "Изобретение"

  - char: "暗"
    readings: "くら, あん"
    meaning: "Тёмный"
    examples:
      - kanji: "暗い"
        reading: "くらい"
        meaning: "Тёмный"
      - kanji: "暗号"
        reading: "あんごう"
        meaning: "Секретный код, шифр"
      - kanji: "暗記"
        reading: "あんき"
        meaning: "Заучивание наизусть"

  - char: "遠"
    readings: "とお, えん"
    meaning: "Далеко"
    examples:
      - kanji: "遠い"
        reading: "とおい"
        meaning: "Далеко, далёкий"
      - kanji: "遠足"
        reading: "えんそく"
        meaning: "Экскурсия, прогулка"

  - char: "近"
    readings: "ちか, きん"
    meaning: "Близко"
    examples:
      - kanji: "近い"
        reading: "ちかい"
        meaning: "Близкий, близко"
      - kanji: "近所"
        reading: "きんじょ"
        meaning: "Соседство, окрестности"
      - kanji: "最近"
        reading: "さいきん"
        meaning: "Недавно, в последнее время"

  - char: "強"
    readings: "つよ, きょう"
    meaning: "Сильный"
    examples:
      - kanji: "強い"
        reading: "つよい"
        meaning: "Сильный"
      - kanji: "勉強"
        reading: "べんきょう"
        meaning: "Учёба, занятия"
      - kanji: "京風"
        reading: "きょうふう"
        meaning: "Стиль Киото"

  - char: "弱"
    readings: "よわ, じゃく"
    meaning: "Слабый"
    examples:
      - kanji: "弱い"
        reading: "よわい"
        meaning: "Слабый"
      - kanji: "強弱"
        reading: "きょうじゃく"
        meaning: "Сильный и слабый (сила и слабость)"

  - char: "重"
    readings: "おも, じゅう"
    meaning: "Тяжёлый"
    examples:
      - kanji: "重い"
        reading: "おもい"
        meaning: "Тяжёлый"
      - kanji: "重大"
        reading: "じゅうだい"
        meaning: "Важный, серьёзный"
      - kanji: "体重"
        reading: "たいじゅう"
        meaning: "Вес тела"

  - char: "軽"
    readings: "かる, けい"
    meaning: "Лёгкий"
    examples:
      - kanji: "軽い"
        reading: "かるい"
        meaning: "Лёгкий (по весу)"
      - kanji: "軽食"
        reading: "けいしょく"
        meaning: "Лёгкая закуска, снек"

  - char: "太"
    readings: "ふと, たい"
    meaning: "Толстый"
    examples:
      - kanji: "太い"
        reading: "ふとい"
        meaning: "Толстый"
      - kanji: "太陽"
        reading: "たいよう"
        meaning: "Солнце"

  - char: "細"
    readings: "ほそ, こま, さい"
    meaning: "Тонкий, мелкий"
    examples:
      - kanji: "細い"
        reading: "ほそい"
        meaning: "Тонкий (в диаметре)"
      - kanji: "細かい"
        reading: "こまかい"
        meaning: "Мелкий, подробный"
      - kanji: "細工"
        reading: "さいく"
        meaning: "Ремесло, тонкая работа"
