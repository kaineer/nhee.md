page:
  type: "kanji"
  title: "Природа и стихии"

kanji:
 - char: "山"
   readings: "やま, さん"
   meaning: "Гора"
   examples:
     - kanji: "山道"
       reading: "やまみち"
       meaning: "Горная дорога"
     - kanji: "富士山"
       reading: "ふじさん"
       meaning: "Гора Фудзи"
     - kanji: "登山"
       reading: "とざん"
       meaning: "Восхождение на гору, альпинизм"

 - char: "川"
   readings: "かわ, せん"
   meaning: "Река"
   examples:
     - kanji: "川岸"
       reading: "かわぎし"
       meaning: "Берег реки"
     - kanji: "小川"
       reading: "おがわ"
       meaning: "Ручей, речушка"
     - kanji: "河川"
       reading: "かせん"
       meaning: "Реки (в целом, водные артерии)"

 - char: "木"
   readings: "き, もく"
   meaning: "Дерево"
   examples:
     - kanji: "木陰"
       reading: "こかげ"
       meaning: "Тень от дерева"
     - kanji: "木々"
       reading: "きぎ"
       meaning: "Деревья (множественное число)"
     - kanji: "木曜日"
       reading: "もくようび"
       meaning: "Четверг"

 - char: "森"
   readings: "もり, しん"
   meaning: "Лес"
   examples:
     - kanji: "森林"
       reading: "しんりん"
       meaning: "Лес (в целом, лесной массив)"
     - kanji: "森の中"
       reading: "もりのなか"
       meaning: "В лесу"
     - kanji: "森羅万象"
       reading: "しんらばんしょう"
       meaning: "Всё сущее, вся природа"

 - char: "花"
   readings: "はな, か"
   meaning: "Цветок"
   examples:
     - kanji: "花びら"
       reading: "はなびら"
       meaning: "Лепесток цветка"
     - kanji: "花火"
       reading: "はなび"
       meaning: "Фейерверк"
     - kanji: "桜花"
       reading: "おうか"
       meaning: "Цветы сакуры"

 - char: "草"
   readings: "くさ, そう"
   meaning: "Трава"
   examples:
     - kanji: "草原"
       reading: "そうげん"
       meaning: "Луг, степь, прерия"
     - kanji: "草花"
       reading: "くさばな"
       meaning: "Травянистые растения и цветы"
     - kanji: "雑草"
       reading: "ざっそう"
       meaning: "Сорняк"

 - char: "田"
   readings: "た, でん"
   meaning: "Рисовое поле"
   examples:
     - kanji: "田んぼ"
       reading: "たんぼ"
       meaning: "Рисовое поле (разговорное)"
     - kanji: "田舎"
       reading: "いなか"
       meaning: "Деревня, провинция"
     - kanji: "水田"
       reading: "すいでん"
       meaning: "Заливное рисовое поле"

 - char: "石"
   readings: "いし, せき"
   meaning: "Камень"
   examples:
     - kanji: "石ころ"
       reading: "いしころ"
       meaning: "Галька, булыжник"
     - kanji: "石橋"
       reading: "いしばし"
       meaning: "Каменный мост"
     - kanji: "宝石"
       reading: "ほうせき"
       meaning: "Драгоценный камень, самоцвет"

 - char: "水"
   readings: "みず, すい"
   meaning: "Вода"
   examples:
     - kanji: "水着"
       reading: "みずぎ"
       meaning: "Купальник"
     - kanji: "水道"
       reading: "すいどう"
       meaning: "Водопровод"
     - kanji: "水曜日"
       reading: "すいようび"
       meaning: "Среда"

 - char: "火"
   readings: "ひ, か"
   meaning: "Огонь"
   examples:
     - kanji: "火事"
       reading: "かじ"
       meaning: "Пожар"
     - kanji: "花火"
       reading: "はなび"
       meaning: "Фейерверк"
     - kanji: "火曜日"
       reading: "かようび"
       meaning: "Вторник"
