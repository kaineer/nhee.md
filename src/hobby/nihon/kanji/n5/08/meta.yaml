page:
  type: "kanji"
  title: "Базовые объекты"

kanji:
 - char: "本"
   readings: "ほん"
   meaning: "Книга"
   examples:
     - kanji: "本屋"
       reading: "ほんや"
       meaning: "Книжный магазин"
     - kanji: "日本"
       reading: "にほん"
       meaning: "Япония"
     - kanji: "本棚"
       reading: "ほんだな"
       meaning: "Книжная полка"

 - char: "紙"
   readings: "かみ, し"
   meaning: "Бумага"
   examples:
     - kanji: "手紙"
       reading: "てがみ"
       meaning: "Письмо"
     - kanji: "新聞紙"
       reading: "しんぶんし"
       meaning: "Газетная бумага, газета"
     - kanji: "紙袋"
       reading: "かみぶくろ"
       meaning: "Бумажный пакет"

 - char: "机"
   readings: "つくえ, き"
   meaning: "Стол (письменный)"
   examples:
     - kanji: "机の上"
       reading: "つくえのうえ"
       meaning: "На столе"
     - kanji: "机上"
       reading: "きじょう"
       meaning: "На столе; теоретический, кабинетный"
     - kanji: "机に向かう"
       reading: "つくえにむかう"
       meaning: "Сидеть за столом (заниматься)"

 - char: "椅"
   readings: "い"
   meaning: "Стул (часть сложного слова)"
   examples:
     - kanji: "椅子"
       reading: "いす"
       meaning: "Стул, кресло"
     - kanji: "車椅子"
       reading: "くるまいす"
       meaning: "Инвалидное кресло (кресло-каталка)"
     - kanji: "椅子取りゲーム"
       reading: "いすとりゲーム"
       meaning: "Игра «Музыкальные стулья»"

 - char: "車"
   readings: "くるま, しゃ"
   meaning: "Машина, автомобиль"
   examples:
     - kanji: "自転車"
       reading: "じてんしゃ"
       meaning: "Велосипед"
     - kanji: "電車"
       reading: "でんしゃ"
       meaning: "Электричка, поезд"
     - kanji: "車道"
       reading: "しゃどう"
       meaning: "Проезжая часть (дорога для машин)"

 - char: "電"
   readings: "でん"
   meaning: "Электричество"
   examples:
     - kanji: "電車"
       reading: "でんしゃ"
       meaning: "Электричка, поезд"
     - kanji: "電話"
       reading: "でんわ"
       meaning: "Телефон"
     - kanji: "電気"
       reading: "でんき"
       meaning: "Электричество, свет (электрический)"

 - char: "魚"
   readings: "さかな, ぎょ"
   meaning: "Рыба"
   examples:
     - kanji: "魚屋"
       reading: "さかなや"
       meaning: "Рыбный магазин"
     - kanji: "金魚"
       reading: "きんぎょ"
       meaning: "Золотая рыбка"
     - kanji: "魚介"
       reading: "ぎょかい"
       meaning: "Морепродукты (рыба и ракообразные/моллюски)"

 - char: "肉"
   readings: "にく"
   meaning: "Мясо"
   examples:
     - kanji: "牛肉"
       reading: "ぎゅうにく"
       meaning: "Говядина"
     - kanji: "豚肉"
       reading: "ぶたにく"
       meaning: "Свинина"
     - kanji: "焼肉"
       reading: "やきにく"
       meaning: "Якинику (жареное мясо, японский барбекю)"

 - char: "米"
   readings: "こめ, べい, まい"
   meaning: "Рис (сырой)"
   examples:
     - kanji: "米国"
       reading: "べいこく"
       meaning: "Америка"
     - kanji: "白米"
       reading: "はくまい"
       meaning: "Белый рис"
     - kanji: "米軍"
       reading: "べいぐん"
       meaning: "Американская армия"
     - kanji: "米屋"
       reading: "こめや"
       meaning: "Рисовый магазин"

 - char: "玉"
   readings: "たま"
   meaning: "Шар, сфера, драгоценность"
   examples:
     - kanji: "玉ねぎ"
       reading: "たまねぎ"
       meaning: "Репчатый лук"
     - kanji: "目玉"
       reading: "めだま"
       meaning: "Глазное яблоко; главная достопримечательность"
     - kanji: "玉子"
       reading: "たまご"
       meaning: "Яйцо"
