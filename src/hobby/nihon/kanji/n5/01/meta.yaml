page:
  type: "kanji"
  title: "Числа от 1 до 10"

kanji:
 - char: "一"
   readings: "いち"
   meaning: "Один"
   examples:
     - kanji: "一月"
       reading: "いちがつ"
       meaning: "Январь"
     - kanji: "一番"
       reading: "いちばん"
       meaning: "Первый, номер один, самый"
     - kanji: "一人"
       reading: "ひとり"
       meaning: "Один человек (нестандартное чтение)"

 - char: "二"
   readings: "に"
   meaning: "Два"
   examples:
     - kanji: "二日"
       reading: "ふつか"
       meaning: "Второе число месяца (или два дня)"
     - kanji: "二月"
       reading: "にがつ"
       meaning: "Февраль"
     - kanji: "二人"
       reading: "ふたり"
       meaning: "Два человека"

 - char: "三"
   readings: "さん"
   meaning: "Три"
   examples:
     - kanji: "三日月"
       reading: "みかづき"
       meaning: "Серп луны (букв. трехдневная луна)"
     - kanji: "三角"
       reading: "さんかく"
       meaning: "Треугольник"
     - kanji: "三日"
       reading: "みっか"
       meaning: "Третье число месяца (или три дня)"

 - char: "四"
   readings: "し, よん"
   meaning: "Четыре"
   examples:
     - kanji: "四角"
       reading: "しかく"
       meaning: "Квадрат, четырехугольник"
     - kanji: "四季"
       reading: "しき"
       meaning: "Четыре времени года"
     - kanji: "四人"
       reading: "よにん"
       meaning: "Четыре человека"

 - char: "五"
   readings: "ご"
   meaning: "Пять"
   examples:
     - kanji: "五目"
       reading: "ごもく"
       meaning: "Пять видов (например, в рисе или супе)"
     - kanji: "五角"
       reading: "ごかく"
       meaning: "Пятиугольник"
     - kanji: "五日"
       reading: "いつか"
       meaning: "Пятое число месяца (или пять дней)"

 - char: "六"
   readings: "ろく"
   meaning: "Шесть"
   examples:
     - kanji: "六法"
       reading: "ろっぽう"
       meaning: "Шесть кодексов (основные законы Японии)"
     - kanji: "六角"
       reading: "ろっかく"
       meaning: "Шестиугольник"
     - kanji: "六日"
       reading: "むいか"
       meaning: "Шестое число месяца (или шесть дней)"

 - char: "七"
   readings: "しち, なな"
   meaning: "Семь"
   examples:
     - kanji: "七色"
       reading: "なないろ"
       meaning: "Семь цветов (радуга)"
     - kanji: "七曜"
       reading: "しちよう"
       meaning: "Семь дней недели"
     - kanji: "七日"
       reading: "なのか"
       meaning: "Седьмое число месяца (или семь дней)"

 - char: "八"
   readings: "はち"
   meaning: "Восемь"
   examples:
     - kanji: "八重"
       reading: "やえ"
       meaning: "Восемь слоев (двойной, многократный)"
     - kanji: "八角"
       reading: "はっかく"
       meaning: "Восьмиугольник (а также бадьян — звездчатый анис)"
     - kanji: "八日"
       reading: "ようか"
       meaning: "Восьмое число месяца (или восемь дней)"

 - char: "九"
   readings: "きゅう, く"
   meaning: "Девять"
   examples:
     - kanji: "九十九"
       reading: "つくも"
       meaning: "Девяносто девять (символ долголетия, старости)"
     - kanji: "九角"
       reading: "きゅうかく"
       meaning: "Девятиугольник"
     - kanji: "九日"
       reading: "ここのか"
       meaning: "Девятое число месяца (или девять дней)"

 - char: "十"
   readings: "じゅう"
   meaning: "Десять"
   examples:
     - kanji: "十字"
       reading: "じゅうじ"
       meaning: "Крест (пересечение десяти направлений)"
     - kanji: "十人"
       reading: "じゅうにん"
       meaning: "Десять человек"
     - kanji: "十日"
       reading: "とおか"
       meaning: "Десятое число месяца (или десять дней)"
