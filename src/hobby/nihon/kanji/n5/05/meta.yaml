page:
  type: "kanji"
  title: "Время"

kanji:
 - char: "日"
   readings: "にち, ひ, か"
   meaning: "Солнце, день"
   examples:
     - kanji: "日曜日"
       reading: "にちようび"
       meaning: "Воскресенье (день Солнца)"
     - kanji: "今日"
       reading: "きょう"
       meaning: "Сегодня"
     - kanji: "三日"
       reading: "みっか"
       meaning: "Третье число месяца (или три дня)"

 - char: "月"
   readings: "つき, げつ, がつ"
   meaning: "Луна, месяц"
   examples:
     - kanji: "月曜日"
       reading: "げつようび"
       meaning: "Понедельник (день Луны)"
     - kanji: "一月"
       reading: "いちがつ"
       meaning: "Январь (первый месяц)"
     - kanji: "半月"
       reading: "はんげつ"
       meaning: "Полмесяца, полулуние"

 - char: "年"
   readings: "ねん, とし"
   meaning: "Год"
   examples:
     - kanji: "今年"
       reading: "ことし"
       meaning: "Этот год (текущий)"
     - kanji: "去年"
       reading: "きょねん"
       meaning: "Прошлый год"
     - kanji: "年上"
       reading: "としうえ"
       meaning: "Старший по возрасту"

 - char: "時"
   readings: "じ, とき"
   meaning: "Время, час"
   examples:
     - kanji: "時間"
       reading: "じかん"
       meaning: "Время (промежуток), часы"
     - kanji: "三時"
       reading: "さんじ"
       meaning: "Три часа (время)"
     - kanji: "時々"
       reading: "ときどき"
       meaning: "Иногда, время от времени"

 - char: "分"
   readings: "ふん, ぶん"
   meaning: "Минута, часть"
   examples:
     - kanji: "五分"
       reading: "ごふん"
       meaning: "Пять минут"
     - kanji: "三十分"
       reading: "さんじゅっぷん"
       meaning: "Тридцать минут (полчаса)"
     - kanji: "半分"
       reading: "はんぶん"
       meaning: "Половина"

 - char: "週"
   readings: "しゅう"
   meaning: "Неделя"
   examples:
     - kanji: "今週"
       reading: "こんしゅう"
       meaning: "Эта неделя"
     - kanji: "来週"
       reading: "らいしゅう"
       meaning: "Следующая неделя"
     - kanji: "先週"
       reading: "せんしゅう"
       meaning: "Прошлая неделя"

 - char: "朝"
   readings: "あさ, ちょう"
   meaning: "Утро"
   examples:
     - kanji: "朝ご飯"
       reading: "あさごはん"
       meaning: "Завтрак"
     - kanji: "朝日"
       reading: "あさひ"
       meaning: "Утреннее солнце (восход)"
     - kanji: "朝方"
       reading: "あさがた"
       meaning: "Под утро, ранним утром"

 - char: "昼"
   readings: "ひる, ちゅう"
   meaning: "Полдень, день (светлое время)"
   examples:
     - kanji: "昼ご飯"
       reading: "ひるごはん"
       meaning: "Обед"
     - kanji: "昼間"
       reading: "ひるま"
       meaning: "Днём, в светлое время суток"
     - kanji: "昼休み"
       reading: "ひるやすみ"
       meaning: "Обеденный перерыв"

 - char: "夜"
   readings: "よる, や"
   meaning: "Ночь"
   examples:
     - kanji: "夜ご飯"
       reading: "よるごはん"
       meaning: "Ужин"
     - kanji: "今夜"
       reading: "こんや"
       meaning: "Сегодня вечером, этой ночью"
     - kanji: "夜中"
       reading: "よなか"
       meaning: "Глубокой ночью, полночь"

 - char: "今"
   readings: "いま, こん"
   meaning: "Сейчас, настоящее время"
   examples:
     - kanji: "今日"
       reading: "きょう"
       meaning: "Сегодня"
     - kanji: "今度"
       reading: "こんど"
       meaning: "На этот раз, в следующий раз"
     - kanji: "今まで"
       reading: "いままで"
       meaning: "До сих пор, до настоящего времени"
