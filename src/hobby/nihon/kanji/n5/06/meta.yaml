page:
  type: "kanji"
  title: "Люди"

kanji:
 - char: "人"
   readings: "ひと, じん, にん"
   meaning: "Человек"
   examples:
     - kanji: "日本人"
       reading: "にほんじん"
       meaning: "Японец"
     - kanji: "一人"
       reading: "ひとり"
       meaning: "Один человек"
     - kanji: "人気"
       reading: "にんき"
       meaning: "Популярность"

 - char: "男"
   readings: "おとこ, だん"
   meaning: "Мужчина"
   examples:
     - kanji: "男の人"
       reading: "おとこのひと"
       meaning: "Мужчина"
     - kanji: "男子"
       reading: "だんし"
       meaning: "Мальчик, юноша, мужчина"
     - kanji: "男性"
       reading: "だんせい"
       meaning: "Мужской пол, мужчина"

 - char: "女"
   readings: "おんな, じょ"
   meaning: "Женщина"
   examples:
     - kanji: "女の人"
       reading: "おんなのひと"
       meaning: "Женщина"
     - kanji: "女子"
       reading: "じょし"
       meaning: "Девочка, девушка, женщина"
     - kanji: "女性"
       reading: "じょせい"
       meaning: "Женский пол, женщина"

 - char: "子"
   readings: "こ, し"
   meaning: "Ребенок"
   examples:
     - kanji: "子供"
       reading: "こども"
       meaning: "Ребенок, дети"
     - kanji: "息子"
       reading: "むすこ"
       meaning: "Сын"
     - kanji: "女子"
       reading: "じょし"
       meaning: "Девочка, девушка"

 - char: "友"
   readings: "とも, ゆう"
   meaning: "Друг"
   examples:
     - kanji: "友達"
       reading: "ともだち"
       meaning: "Друг, товарищ"
     - kanji: "友人"
