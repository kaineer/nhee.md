       meaning: "Друг"
     - kanji: "親友"
       reading: "しんゆう"
       meaning: "Близкий друг, лучший друг"

 - char: "先生"
   readings: "せんせい"
   meaning: "Учитель, наставник"
   examples:
     - kanji: "先生"
