       meaning: "Врач"
     - kanji: "学校の先生"
       reading: "がっこうのせんせい"
       meaning: "Школьный учитель"

 - char: "学"
   readings: "がく, まな"
   meaning: "Учеба, изучение"
   examples:
     - kanji: "学生"
       reading: "がくせい"
