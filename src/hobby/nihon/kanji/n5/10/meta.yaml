page:
  type: "kanji"
  title: "Прилагательные и цвета"

kanji:
 - char: "大"
   readings: "おお, だい"
   meaning: "Большой"
   examples:
     - kanji: "大きい"
       reading: "おおきい"
       meaning: "Большой"
     - kanji: "大学"
       reading: "だいがく"
       meaning: "Университет"
     - kanji: "大人"
       reading: "おとな"
       meaning: "Взрослый человек"

 - char: "小"
   readings: "ちい, しょう"
   meaning: "Маленький"
   examples:
     - kanji: "小さい"
       reading: "ちいさい"
       meaning: "Маленький"
     - kanji: "小学校"
       reading: "しょうがっこう"
       meaning: "Начальная школа"
     - kanji: "小鳥"
       reading: "ことり"
       meaning: "Маленькая птичка, птаха"

 - char: "高"
   readings: "たか, こう"
   meaning: "Высокий; дорогой"
   examples:
     - kanji: "高い"
       reading: "たかい"
       meaning: "Высокий; дорогой"
     - kanji: "高校"
       reading: "こうこう"
       meaning: "Старшая школа"
     - kanji: "高速道路"
       reading: "こうそくどうろ"
       meaning: "Автомагистраль, скоростная дорога"

 - char: "低"
   readings: "ひく, てい"
   meaning: "Низкий"
   examples:
     - kanji: "低い"
       reading: "ひくい"
       meaning: "Низкий"
     - kanji: "低温"
       reading: "ていおん"
       meaning: "Низкая температура"
     - kanji: "低気圧"
       reading: "ていきあつ"
       meaning: "Низкое атмосферное давление (циклон)"

 - char: "新"
   readings: "あたら, しん"
   meaning: "Новый"
   examples:
     - kanji: "新しい"
       reading: "あたらしい"
       meaning: "Новый"
     - kanji: "新聞"
       reading: "しんぶん"
       meaning: "Газета"
     - kanji: "新幹線"
       reading: "しんかんせん"
       meaning: "Синкансэн"

 - char: "古"
   readings: "ふる, こ"
   meaning: "Старый"
   examples:
     - kanji: "古い"
       reading: "ふるい"
       meaning: "Старый"
     - kanji: "古着"
       reading: "ふるぎ"
       meaning: "Старая одежда, секонд-хенд"
     - kanji: "中古"
       reading: "ちゅうこ"
       meaning: "Подержанный, б/у"

 - char: "白"
   readings: "しろ, はく"
   meaning: "Белый"
   examples:
     - kanji: "白い"
       reading: "しろい"
       meaning: "Белый"
     - kanji: "白鳥"
       reading: "はくちょう"
       meaning: "Лебедь (букв. белая птица)"
     - kanji: "白米"
       reading: "はくまい"
       meaning: "Белый рис"

 - char: "黒"
   readings: "くろ, こく"
   meaning: "Чёрный"
   examples:
     - kanji: "黒い"
       reading: "くろい"
       meaning: "Чёрный"
     - kanji: "黒板"
       reading: "こくばん"
       meaning: "Школьная доска"
     - kanji: "黒豆"
       reading: "くろまめ"
       meaning: "Чёрные бобы"

 - char: "赤"
   readings: "あか, せき"
   meaning: "Красный"
   examples:
     - kanji: "赤い"
       reading: "あかい"
       meaning: "Красный"
     - kanji: "赤ちゃん"
       reading: "あかちゃん"
       meaning: "Младенец, грудной ребёнок"
     - kanji: "赤信号"
       reading: "あかしんごう"
       meaning: "Красный свет светофора"

 - char: "青"
   readings: "あお, せい"
   meaning: "Синий, зелёный"
   examples:
     - kanji: "青い"
       reading: "あおい"
       meaning: "Синий, зелёный"
     - kanji: "青空"
       reading: "あおぞら"
       meaning: "Голубое небо"
     - kanji: "青信号"
       reading: "あおしんごう"
       meaning: "Зелёный свет светофора"
