page:
  type: "kanji"
  title: "Погода и небо"

kanji:
 - char: "天"
   readings: "てん, あま"
   meaning: "Небо, небеса"
   examples:
     - kanji: "天気"
       reading: "てんき"
       meaning: "Погода"
     - kanji: "天国"
       reading: "てんごく"
       meaning: "Рай"
     - kanji: "天の川"
       reading: "あまのがわ"
       meaning: "Млечный Путь (Небесная река)"

 - char: "空"
   readings: "そら, くう"
   meaning: "Небо"
   examples:
     - kanji: "空気"
       reading: "くうき"
       meaning: "Воздух"
     - kanji: "青空"
       reading: "あおぞら"
       meaning: "Голубое небо"
     - kanji: "空港"
       reading: "くうこう"
       meaning: "Аэропорт"

 - char: "雨"
   readings: "あめ, う"
   meaning: "Дождь"
   examples:
     - kanji: "大雨"
       reading: "おおあめ"
       meaning: "Ливень, сильный дождь"
     - kanji: "雨具"
       reading: "あめぐ"
       meaning: "Дождевик, плащ от дождя"
     - kanji: "梅雨"
       reading: "つゆ"
       meaning: "Сезон дождей"

 - char: "風"
   readings: "かぜ, ふう"
   meaning: "Ветер"
   examples:
     - kanji: "台風"
       reading: "たいふう"
       meaning: "Тайфун"
     - kanji: "風邪"
       reading: "かぜ"
       meaning: "Простуда"
     - kanji: "風景"
       reading: "ふうけい"
       meaning: "Пейзаж, вид"

 - char: "雪"
   readings: "ゆき, せつ"
   meaning: "Снег"
   examples:
     - kanji: "大雪"
       reading: "おおゆき"
       meaning: "Сильный снегопад"
     - kanji: "雪だるま"
       reading: "ゆきだるま"
       meaning: "Снеговик"
     - kanji: "雪国"
       reading: "ゆきぐに"
       meaning: "Снежная страна"

 - char: "晴"
   readings: "はれ, せい"
   meaning: "Ясная погода"
   examples:
     - kanji: "晴れ"
       reading: "はれ"
       meaning: "Ясно, солнечно (прогноз погоды)"
     - kanji: "晴天"
       reading: "せいてん"
       meaning: "Ясное небо"
     - kanji: "晴れる"
       reading: "はれる"
       meaning: "Проясняться, становиться солнечно"

 - char: "曇"
   readings: "くも, どん"
   meaning: "Пасмурно, облачно"
   examples:
     - kanji: "曇り"
       reading: "くもり"
       meaning: "Облачно (прогноз погоды)"
     - kanji: "曇天"
       reading: "どんてん"
       meaning: "Пасмурное небо"
     - kanji: "曇る"
       reading: "くもる"
       meaning: "Затягиваться облаками, становиться пасмурным"

 - char: "星"
   readings: "ほし, せい"
   meaning: "Звезда"
   examples:
     - kanji: "星占い"
       reading: "ほしうらない"
       meaning: "Астрология, гороскоп"
     - kanji: "流星"
       reading: "りゅうせい"
       meaning: "Метеор, падающая звезда"
     - kanji: "星空"
       reading: "ほしぞら"
       meaning: "Звездное небо"

 - char: "太"
   readings: "たい, ふと"
   meaning: "Большой, толстый"
   examples:
     - kanji: "太陽"
       reading: "たいよう"
       meaning: "Солнце"
     - kanji: "太い"
       reading: "ふとい"
       meaning: "Толстый (о предмете)"
     - kanji: "太る"
       reading: "ふとる"
       meaning: "Толстеть, набирать вес"

 - char: "光"
   readings: "ひかり, こう"
   meaning: "Свет"
   examples:
     - kanji: "日光"
       reading: "にっこう"
       meaning: "Солнечный свет"
     - kanji: "光る"
       reading: "ひかる"
       meaning: "Светиться, сиять"
     - kanji: "光線"
       reading: "こうせん"
       meaning: "Луч света"
