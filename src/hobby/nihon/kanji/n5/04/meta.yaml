page:
  type: "kanji"
  title: "Направления (31-40)"

kanji:
 - char: "上"
   readings: "うえ, じょう"
   meaning: "Вверх, верх"
   examples:
     - kanji: "上がる"
       reading: "あがる"
       meaning: "Подниматься, входить"
     - kanji: "上手"
       reading: "じょうず"
       meaning: "Умелый, мастеровитый"
     - kanji: "上手い"
       reading: "うまい"
       meaning: "Умелый, искусный; вкусный (i-прилагательное)"
     - kanji: "上着"
       reading: "うわぎ"
       meaning: "Верхняя одежда, пиджак"

 - char: "下"
   readings: "した, か"
   meaning: "Вниз, низ"
   examples:
     - kanji: "下がる"
       reading: "さがる"
       meaning: "Опускаться, снижаться"
     - kanji: "地下"
       reading: "ちか"
       meaning: "Подземный, подвал"
     - kanji: "下手"
       reading: "へた"
       meaning: "Неумелый, неловкий"

 - char: "左"
   readings: "ひだり, さ"
   meaning: "Лево, левый"
   examples:
     - kanji: "左側"
       reading: "ひだりがわ"
       meaning: "Левая сторона"
     - kanji: "左手"
       reading: "ひだりて"
       meaning: "Левая рука"
     - kanji: "左折"
       reading: "させつ"
       meaning: "Поворот налево"

 - char: "右"
   readings: "みぎ, ゆう"
   meaning: "Право, правый"
   examples:
     - kanji: "右側"
       reading: "みぎがわ"
       meaning: "Правая сторона"
     - kanji: "右手"
       reading: "みぎて"
       meaning: "Правая рука"
     - kanji: "右折"
       reading: "うせつ"
       meaning: "Поворот направо"

 - char: "中"
   readings: "なか, ちゅう"
   meaning: "Внутри, середина"
   examples:
     - kanji: "中学校"
       reading: "ちゅうがっこう"
       meaning: "Средняя школа"
     - kanji: "真ん中"
       reading: "まんなか"
       meaning: "Самая середина, центр"
     - kanji: "中国"
       reading: "ちゅうごく"
       meaning: "Китай (страна в центре)"

 - char: "外"
   readings: "そと, がい"
   meaning: "Снаружи, внешний"
   examples:
     - kanji: "外国"
       reading: "がいこく"
       meaning: "Иностранное государство"
     - kanji: "外側"
       reading: "そとがわ"
       meaning: "Наружная сторона"
     - kanji: "外出"
       reading: "がいしゅつ"
       meaning: "Выход на улицу, выход из дома"

 - char: "前"
   readings: "まえ, ぜん"
   meaning: "Вперед, перед"
   examples:
     - kanji: "前進"
       reading: "ぜんしん"
       meaning: "Продвижение вперед, прогресс"
     - kanji: "名前"
       reading: "なまえ"
       meaning: "Имя (имя перед фамилией)"
     - kanji: "午前"
       reading: "ごぜん"
       meaning: "Утро, до полудня (AM)"

 - char: "後"
   readings: "うしろ, あと, ご"
   meaning: "Назад, сзади, после"
   examples:
     - kanji: "後ろ"
       reading: "うしろ"
       meaning: "Сзади, позади"
     - kanji: "後で"
       reading: "あとで"
       meaning: "Позже, потом"
     - kanji: "午後"
       reading: "ごご"
       meaning: "После полудня (PM)"

 - char: "東"
   readings: "ひがし, とう"
   meaning: "Восток"
   examples:
     - kanji: "東側"
       reading: "ひがしがわ"
       meaning: "Восточная сторона"
     - kanji: "東京"
       reading: "とうきょう"
       meaning: "Токио (Восточная столица)"
     - kanji: "東海"
       reading: "とうかい"
       meaning: "Восточное море (регион Японии)"

 - char: "西"
   readings: "にし, せい"
   meaning: "Запад"
   examples:
     - kanji: "西側"
       reading: "にしがわ"
       meaning: "Западная сторона"
     - kanji: "西洋"
       reading: "せいよう"
       meaning: "Запад (Европа, Америка)"
     - kanji: "関西"
       reading: "かんさい"
       meaning: "Кансай (регион Западной Японии)"
